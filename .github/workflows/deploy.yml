name: Deploy Personal Org Environment (on merge)

on:
  push:
    branches:
      - main
    paths:
      - 'force-app/**'

jobs:
  Deploy:
    runs-on: ubuntu-latest
    environment: personal
    steps:
      - name: '[DEBUG] Setup Node'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: '[DEBUG] Checkout source code'
        uses: actions/checkout@v3
        with:
          fetch-depth: '2'

      - name: '[DEBUG] Install sfdx'
        run: |
          npm install @salesforce/cli --global
          sf --version

      - name: '[DEBUG] Install sfdx git delta'
        run: |
          echo Y | sfdx plugins:install sfdx-git-delta
          sfdx plugins

      - name: '[DEBUG] Create delta packages'
        run: |
          mkdir changed-sources
          sf sgd source delta --to "HEAD" --from "HEAD~1" --output changed-sources/ --generate-delta --source force-app/

      - name: '[DEBUG] Login to Salesforce'
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          sf org login jwt \
            --username "${{ secrets.DEPLOYMENT_USER_NAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.CONSUMER_KEY }}" \
            --instance-url ${{ vars.INSTANCE_URL }} \
            --set-default
          sf org display --target-org "${{ secrets.DEPLOYMENT_USER_NAME }}"

      - name: '[DEBUG] Deploy metadata'
        run: |
          echo "[DEBUG] Starting deployment..."
          sf project deploy start \
            --source-dir changed-sources/force-app \
            --test-level RunLocalTests
